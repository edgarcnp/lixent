name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    code-quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install Bun
              uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Type check
              run: bunx tsc --noEmit

            - name: Lint
              run: bun run lint

    build:
        runs-on: ubuntu-latest
        needs: code-quality
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Install Bun
              uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build
