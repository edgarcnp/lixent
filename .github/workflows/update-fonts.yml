name: Update Font Catalog

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fonts:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate API key
        run: |
          if [ -z "${{ secrets.LIXENT_GOOGLE_FONTS_API_KEY }}" ]; then
            echo "::error::LIXENT_GOOGLE_FONTS_API_KEY secret is not set or empty."
            echo "Set it in Settings → Secrets and variables → Actions → Repository secrets."
            exit 1
          fi

      - name: Fetch Google Fonts catalog
        run: |
          mkdir -p dist
          curl -sf --retry 2 --retry-delay 5 \
            "https://www.googleapis.com/webfonts/v1/webfonts?key=${{ secrets.LIXENT_GOOGLE_FONTS_API_KEY }}&sort=alpha" \
            -o dist/fonts.json
          echo "Fetched $(jq '.items | length' dist/fonts.json) fonts"

      - name: Push to fonts-data branch
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: fonts-data
          publish_dir: dist
          force_orphan: true
