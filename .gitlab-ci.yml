default:
    image: oven/bun:latest

pages:
    stage: deploy
    script:
        - bun install --frozen-lockfile
        - bunx tsc --noEmit
        - bun run lint
        - bun test
        - bun run build
        - mv dist public
    pages: true
    rules:
        - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
